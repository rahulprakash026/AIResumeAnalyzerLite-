name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-django
          if [ -f django-app/requirements.txt ]; then pip install -r django-app/requirements.txt; fi
          if [ -f flask-ai-service/requirements.txt ]; then pip install -r flask-ai-service/requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 django-app flask-ai-service --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 django-app flask-ai-service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker images
        run: |
          docker compose build
