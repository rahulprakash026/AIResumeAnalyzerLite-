version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-resumedb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    networks:
      - resume_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-resumedb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - resume_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  flask-ai:
    build:
      context: ./flask-ai-service
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=5000
    networks:
      - resume_network
    restart: unless-stopped

  django:
    build:
      context: ./django-app
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./django-app:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DB_HOST=db
      - DB_NAME=${POSTGRES_DB:-resumedb}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASS=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379/0
      - FLASK_AI_URL=http://flask-ai:5000
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-supersecretkey}
      - DJANGO_DEBUG=1
      - DJANGO_ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - resume_network

  celery:
    build:
      context: ./django-app
      dockerfile: Dockerfile
    command: celery -A core worker -l info
    volumes:
      - ./django-app:/app
      - media_volume:/app/media
    environment:
      - DB_HOST=db
      - DB_NAME=${POSTGRES_DB:-resumedb}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASS=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379/0
      - FLASK_AI_URL=http://flask-ai:5000
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-supersecretkey}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - resume_network

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - django
      - flask-ai
    networks:
      - resume_network

networks:
  resume_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume:
